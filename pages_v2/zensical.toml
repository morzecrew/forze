[project]
site_name = "Forze"
site_url = "https://morzecrew.github.io/forze"
site_description = "Domain-Driven Design and Hexagonal Architecture for backend services"
site_author = "Lev Litvinov"
copyright = "&copy; 2026 Lev Litvinov and contributors"

# ....................... #
# Repo

repo_url = "https://github.com/morzecrew/forze"
repo_name = "forze"

# ....................... #
# Styles

extra_css = ["_stylesheets/extra.css"]

# ....................... #
# Navigation

nav = [
    { "Home" = "index.md" },
    { "Get Started" = [
        "get-started/installation.md",
        "get-started/quickstart.md",
        "get-started/project-structure.md",
    ] },
    { "Learn" = [
        { "Concepts" = [
            "core-concepts/overview.md",
            "core-concepts/architecture.md",
            "core-concepts/domain-layer.md",
            "core-concepts/application-layer.md",
            "core-concepts/contracts.md",
            "core-concepts/runtime.md",
        ] },
        { "In Depth" = [
            "in-depth/wiring.md",
            "in-depth/transactions.md",
            "in-depth/capability-execution.md",
            "in-depth/errors.md",
            "in-depth/concurrency-conflicts.md",
            "in-depth/resilience.md",
            "in-depth/idempotency.md",
            "in-depth/events-sagas.md",
            "in-depth/reading-data.md",
            "in-depth/multi-tenancy.md",
            "in-depth/identity.md",
            "in-depth/observability.md",
        ] },
    ] },
    { "Integrations" = [
        "integrations/index.md",
        { "Data" = [
            "integrations/postgres.md",
            "integrations/redis.md",
        ] },
        { "Inbound" = [
            "integrations/fastapi.md",
        ] },
    ] },
    { "Recipes" = [
        "recipes/cache-reads-with-redis.md",
        "recipes/postgres.md",
    ] },
    { "Reference" = [
        "reference/query-syntax.md",
    ] },
]

# ....................... #
# Development

dev_addr = "localhost:8045"

# ....................... #
# Theme

[project.theme]
features = [
    "search.highlight",
    "navigation.footer",
    "navigation.instant",
    "navigation.tabs",
    "navigation.sections",
    "navigation.path",
    "navigation.top",
    "toc.follow",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
]
custom_dir = "overrides"
logo = "_images/forze-multicolor.png"
favicon = "images/forze-multicolor.png"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "blue grey"
accent = "deep orange"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
primary = "blue grey"
accent = "deep orange"

# ....................... #
# Extensions

[project.markdown_extensions.zensical.extensions.glightbox]
auto_themed = true
auto_caption = true

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs", "../examples"]
check_paths = true
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
