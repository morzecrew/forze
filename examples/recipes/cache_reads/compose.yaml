# Ephemeral infra for the cache-reads recipe.
# No volumes on purpose — nothing persists; `down` leaves a clean machine.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: forze
      POSTGRES_PASSWORD: forze
      POSTGRES_DB: forze
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forze"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
