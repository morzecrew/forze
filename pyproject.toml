kms-gcp = ["google-cloud-kms>=2.24.0"]
kms-yc = ["yandexcloud>=0.300.0"]
mongo = ["pymongo>=4.16.0"]
firestore = ["google-cloud-firestore>=2.21.0"]
gcs = ["aiohttp>=3.11.0", "gcloud-aio-storage>=9.6.0", "python-magic>=0.4.27"]
bigquery = ["aiohttp>=3.11.0", "gcloud-aio-bigquery>=7.1.0"]
clickhouse = ["clickhouse-connect[async]>=1.0.0"]
duckdb = ["duckdb>=1.1.0", "pyarrow>=17.0.0"]
rabbitmq = ["aio-pika>=9.6.1"]
kafka = ["aiokafka>=0.14.0"]
socketio = [
    "python-socketio>=5.16.1",
    "python-socketio-stubs>=5.16.1.0.20260211",
]
neo4j = ["neo4j>=6.1.0"]
authn = [
    "argon2-cffi>=25.1.0",
    "email-validator>=2.3.0",
    "pyjwt[crypto]>=2.12.1",
]
oidc = ["pyjwt[crypto]>=2.12.1", "httpx>=0.28.0"]
vault = [
    "hvac[parser]>=2.4.0",
    "requests>=2.34.2",
    "types-hvac>=2.4.0.20260518",
    "urllib3>=2.7.0",
]
inngest = ["inngest>=0.5.18"]
meilisearch = ["meilisearch-python-sdk>=7.2.1"]
http = ["httpx>=0.28.0"]
mcp = ["fastmcp>=3.0.0", "mcp>=1.27.0"]
dst = ["polyfactory>=3.3.0", "hypothesis>=6.153.0"]
cli = ["typer>=0.12.0"]

# ....................... #

[project.urls]
homepage = "https://github.com/morzecrew/forze"
documentation = "https://morzecrew.github.io/forze/"
changelog = "https://github.com/morzecrew/forze/blob/main/CHANGELOG.md"

[project.scripts]
forze = "forze_cli:main"

# ....................... #
# Build

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.sdist]
include = [
    "src",
    "pyproject.toml",
    "README.md",
    "uv.lock",
    "tests",
    "CHANGELOG.md",
]

[tool.hatch.build.targets.wheel]
packages = [
    "src/forze",
    "src/forze_kits",
    "src/forze_fastapi",
    "src/forze_mock",
    "src/forze_dst",
    "src/forze_cli",
    "src/forze_mongo",
    "src/forze_firestore",
    "src/forze_postgres",
    "src/forze_rabbitmq",
    "src/forze_kafka",
    "src/forze_redis",
    "src/forze_s3",
    "src/forze_gcs",
    "src/forze_bigquery",
    "src/forze_clickhouse",
    "src/forze_duckdb",
    "src/forze_identity",
    "src/forze_socketio",
    "src/forze_sqs",
    "src/forze_kms",
    "src/forze_temporal",
    "src/forze_inngest",
    "src/forze_vault",
    "src/forze_meilisearch",
    "src/forze_http",
    "src/forze_neo4j",
    "src/forze_mcp",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/forze/_version.py"

# ....................... #
# Pytest

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:Deprecated call to `pkg_resources.declare_namespace`:DeprecationWarning",
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
    "ignore::pytest.PytestCollectionWarning",
]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
pythonpath = ["src", "tests"]
addopts = ["--tb=short", "--strict-markers", "--strict-config"]
asyncio_mode = "auto"
# Safety net: no test may hang the run indefinitely. On timeout, dump all thread
# stacks and kill the process (the `thread` method guarantees the run can't stick).
# Defense-in-depth, not a fix — it's how the Temporal-sandbox/coverage-sysmon deadlock
# (see CI's COVERAGE_CORE=ctrace) was diagnosed: the dumped stack pinpointed the wedge.
# Generous enough to cover container/session-fixture startup on a cold runner.
timeout = 300
timeout_method = "thread"
markers = [
    "perf: Performance benchmark (excluded from default just test; not all perf tests need Docker)",
    "perf_gate: In-process, deterministic benchmark gated for regressions in CI (same-runner A/B vs merge-base)",
    "fuzz: Extended DST fuzz over many seeds (excluded from default just test; run via just fuzz, e.g. nightly)",
    "integration: Integration test",
    "unit: Unit test",
    "asyncio: Async test",
    "mongo_atlas_search: Integration test requiring mongodb/mongodb-atlas-local",
    "yc_kms: Integration test requiring real Yandex Cloud KMS credentials (no emulator exists; skipped unless FORZE_YC_KMS_KEY_ID is set)",
]

[tool.coverage.run]
source = ["src"]
branch = true
# Relative paths so per-shard data files combine cleanly across CI jobs.
relative_files = true
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/_version.py",
    "*/_compat.py",
    "*/_logging.py",
    # Temporal worker interceptors are exercised with a full SDK runtime.
    "*/forze_temporal/interceptors/*",
    # Redis deps module is exercised with a full SDK runtime.
    "*/forze_redis/execution/deps/module.py",
    "*/forze_meilisearch/execution/deps/module.py",
    "*/forze_neo4j/execution/deps/module.py",
    "*/forze_kafka/execution/deps/module.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
sort = "cover"
precision = 1
# Global floor: enforced in CI (see .github/workflows/ci.yml). Per-package
# floors are enforced on top of it — see [tool.coverage_floors] below.
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    # ``@overload`` stubs (and their ``...`` bodies) are type-checker-only: the
    # runtime impl follows them, so they are never executed. Excluding them keeps
    # branch coverage honest instead of penalizing typed overloaded signatures.
    "@overload",
    "@(typing\\.)?overload",
    "^\\s*\\.\\.\\.$",
    # Inline ellipsis stub bodies (``def f(...) -> T: ...``, including the closing
    # line of a multi-line signature) are the same type-checker-only stubs as the
    # own-line ``...`` above. The formatter collapses Protocol/overload bodies to
    # this inline form, so match the terminating ``: ...`` to keep branch coverage
    # honest for inline-stub Protocols (e.g. forze.base.serialization.model_codec).
    ": \\.\\.\\.\\s*$",
]

# ....................... #
# Per-package coverage floors
#
# Enforced by .github/scripts/coverage_floors.py in the CI coverage job, on top
# of the global fail_under gate above (a thin new package must not hide behind
# the well-covered core). Every top-level forze* package under src/ is gated:
# packages get `default` unless listed in `exceptions`, so a brand-new package
# is enforced automatically. Locally: `just coverage-floors` (full suite +
# check) or `just coverage-floors-check` (existing .coverage data).
#
# Calibration: floors gate the COMBINED unit+integration coverage that CI
# measures (all test shards merged) — a unit-only run reports far lower numbers
# for integration-heavy packages and must not be used to tune this table.

[tool.coverage_floors]
default = 80

# Exceptions ratchet reality, not aspiration: one entry per package that
# legitimately sits below the default TODAY (package = its current floor, with
# a trailing reason). Raise or delete entries as coverage improves.
# Empty as of 2026-07-13: combined CI coverage has every package >= 82%.
[tool.coverage_floors.exceptions]

# ....................... #
# Mypy configuration

[tool.mypy]
strict = true
warn_return_any = false
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = ["aiokafka.*", "grpc.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# The yandexcloud SDK re-exports `SDK` implicitly (it is not in `__all__`), and its
# generated protobuf stubs under `yandex.*` ship no types.
module = ["yandexcloud", "yandexcloud.*", "yandex.*"]
ignore_missing_imports = true
implicit_reexport = true

# ....................... #
# Import contracts

[tool.importlinter]
root_packages = [
    "forze",
    "forze_kits",
    "forze_fastapi",
    "forze_mock",
    "forze_dst",
    "forze_cli",
    "forze_postgres",
    "forze_redis",
    "forze_s3",
    "forze_gcs",
    "forze_bigquery",
    "forze_clickhouse",
    "forze_duckdb",
    "forze_socketio",
    "forze_temporal",
    "forze_inngest",
    "forze_mongo",
    "forze_firestore",
    "forze_rabbitmq",
    "forze_kafka",
    "forze_sqs",
    "forze_kms",
    "forze_identity",
    "forze_vault",
    "forze_meilisearch",
    "forze_http",
    "forze_neo4j",
    "forze_mcp",
]
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
name = "Layered `forze` package architecture"
type = "layers"
layers = ["forze.application", "forze.domain", "forze.base"]

[[tool.importlinter.contracts]]
name = "Layered `forze.application` module architecture"
type = "layers"
layers = [
    "forze.application.hooks",
    "forze.application.execution",
    "forze.application.integrations",
    "forze.application.contracts",
]

[[tool.importlinter.contracts]]
name = "Core forze must not import forze_kits"
type = "forbidden"
source_modules = ["forze"]
forbidden_modules = ["forze_kits"]

[[tool.importlinter.contracts]]
name = "Authz contracts do not import execution contracts"
type = "forbidden"
source_modules = ["forze.application.contracts.authz"]
forbidden_modules = ["forze.application.contracts.execution"]

[[tool.importlinter.contracts]]
name = "Resilience contracts do not import execution"
type = "forbidden"
source_modules = ["forze.application.contracts.resilience"]
forbidden_modules = ["forze.application.execution"]

[[tool.importlinter.contracts]]
name = "Domain contracts do not import execution"
type = "forbidden"
source_modules = ["forze.application.contracts.domain"]
forbidden_modules = ["forze.application.execution"]

[[tool.importlinter.contracts]]
name = "Idempotency contracts do not import execution"
type = "forbidden"
source_modules = ["forze.application.contracts.idempotency"]
forbidden_modules = ["forze.application.execution"]

[[tool.importlinter.contracts]]
name = "Inbox contracts do not import execution"
type = "forbidden"
source_modules = ["forze.application.contracts.inbox"]
forbidden_modules = ["forze.application.execution"]

[[tool.importlinter.contracts]]
name = "Saga contracts do not import execution"
type = "forbidden"
source_modules = ["forze.application.contracts.saga"]
forbidden_modules = ["forze.application.execution"]

[[tool.importlinter.contracts]]
name = "Layered `forze.domain` module architecture"
type = "layers"
layers = ["forze.domain.models", "forze.domain.validation"]

[[tool.importlinter.contracts]]
name = "forze_kits.domain must not import forze_kits.aggregates"
type = "forbidden"
source_modules = ["forze_kits.domain"]
forbidden_modules = ["forze_kits.aggregates"]

[[tool.importlinter.contracts]]
name = "Only sanctioned consumers may import forze_kits"
type = "protected"
protected_modules = ["forze_kits"]
allowed_importers = ["forze_fastapi"]
as_packages = true

[[tool.importlinter.contracts]]
name = "Nothing imports forze_identity"
type = "protected"
protected_modules = ["forze_identity"]
allowed_importers = []
as_packages = true

[[tool.importlinter.contracts]]
name = "Protect integration subpackages"
type = "protected"
protected_modules = [
    "forze_fastapi",
    "forze_mock",
    "forze_dst",
    "forze_cli",
    "forze_postgres",
    "forze_redis",
    "forze_s3",
    "forze_gcs",
    "forze_bigquery",
    "forze_clickhouse",
    "forze_duckdb",
    "forze_socketio",
    "forze_temporal",
    "forze_inngest",
    "forze_mongo",
    "forze_firestore",
    "forze_rabbitmq",
    "forze_kafka",
    "forze_sqs",
    "forze_kms",
    "forze_vault",
    "forze_meilisearch",
    "forze_http",
    "forze_neo4j",
    "forze_mcp",
]
allowed_importers = ["forze_cli"]
as_packages = true

# ....................... #
# Dead code

[tool.vulture]
paths = [
    "src/forze",
    "src/forze_kits",
    "src/forze_fastapi",
    "src/forze_mock",
    "src/forze_dst",
    "src/forze_cli",
    "src/forze_postgres",
    "src/forze_redis",
    "src/forze_s3",
    "src/forze_gcs",
    "src/forze_bigquery",
    "src/forze_clickhouse",
    "src/forze_duckdb",
    "src/forze_socketio",
    "src/forze_temporal",
    "src/forze_inngest",
    "src/forze_mongo",
    "src/forze_firestore",
    "src/forze_rabbitmq",
    "src/forze_kafka",
    "src/forze_sqs",
    "src/forze_kms",
    "src/forze_identity",
    "src/forze_vault",
