    "aiobotocore>=2.25.1",
    "botocore>=1.40.61",
    "python-magic>=0.4.27",
    "types-aioboto3[s3]>=15.5.0",
    "types-aiobotocore>=3.1.3",
]
sqs = [
    "aioboto3>=15.5.0",
    "aiobotocore>=2.25.1",
    "botocore>=1.40.61",
    "types-aioboto3[sqs]>=15.5.0",
    "types-aiobotocore>=3.1.3",
]
kms-aws = [
    "aioboto3>=15.5.0",
    "aiobotocore>=2.25.1",
    "botocore>=1.40.61",
    "types-aioboto3[kms]>=15.5.0",
    "types-aiobotocore>=3.1.3",
