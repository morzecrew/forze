[project]
name = "forze"
dynamic = ["version"]
classifiers = [
    "PyOCI :: Label :: org.opencontainers.image.source :: https://github.com/morzecrew/forze",
]
requires-python = ">=3.13,<3.15"

# ....................... #
# Dependencies

dependencies = [
    "aioboto3>=15.5.0",
    "aiobotocore>=2.25.1",
    "attrs>=25.4.0",
    "botocore>=1.40.61",
    "deepdiff>=8.6.1",
    "mergedeep>=1.3.4",
    "orjson>=3.11.7",
    "psycopg-pool>=3.3.0",
    "psycopg[binary]>=3.3.3",
    "pydantic>=2.12.5",
    "pydantic-extra-types>=2.11.0",
    "python-dateutil>=2.9.0.post0",
    "python-magic>=0.4.27",
    "pyyaml>=6.0.3",
    "redis>=7.2.0",
    "temporalio>=1.23.0",
    "types-aioboto3[s3]>=15.5.0",
    "types-aiobotocore>=3.1.3",
]

[dependency-groups]
dev = [
    "bandit>=1.9.3",
    "deptry>=0.24.0",
    "import-linter>=2.10",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "radon>=6.0.1",
    "vulture>=2.14",
]

[project.optional-dependencies]
fastapi = ["annotated-doc>=0.0.4", "fastapi>=0.131.0", "starlette>=0.52.1"]

# ....................... #
# Private index (PyOCI)

[[tool.uv.index]]
name = "pyoci"
url = "https://pyoci.com/ghcr.io/morzecrew/"
publish-url = "https://pyoci.com/ghcr.io/morzecrew/"
explicit = true

[project.urls]
repository = "https://github.com/morzecrew/forze"
documentation = "https://github.com/morzecrew/forze/README.md"

# ....................... #
# Build

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.sdist]
include = [
    "src",
    "pyproject.toml",
    "README.md",
    "uv.lock",
    "tests",
    "CHANGELOG.md",
]

[tool.hatch.build.targets.wheel]
packages = ["src/forze", "src/forze_fastapi"]

[tool.hatch.build.hooks.vcs]
version-file = "src/forze/_version.py"

# ....................... #
# Pytest

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:Deprecated call to `pkg_resources.declare_namespace`:DeprecationWarning",
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
    "ignore::pytest.PytestCollectionWarning",
]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
pythonpath = "src"
addopts = ["--tb=short", "--strict-markers", "--strict-config", "--cov"]

[tool.coverage.run]
source = ["src"]
branch = true
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
# fail_under = 90 # disabled for time being
precision = 1
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]

# ....................... #
# Import contracts

[tool.importlinter]
root_packages = ["forze", "forze_fastapi"]

[[tool.importlinter.contracts]]
name = "Layered package architecture"
type = "layers"
layers = ["forze.infra", "forze.application", "forze.domain", "forze.base"]

[[tool.importlinter.contracts]]
name = "Layered `application` module architecture"
type = "layers"
layers = [
    "forze.application.composition",
    "forze.application.facades",
    "forze.application.usecases",
    "forze.application.dto",
    "forze.application.kernel",
]

[[tool.importlinter.contracts]]
name = "Layered `domain` module architecture"
type = "layers"
layers = [
    "forze.domain.mixins",
    "forze.domain.models",
    "forze.domain.validation",
]

[[tool.importlinter.contracts]]
name = "Infrastructure providers independence"
type = "independence"
modules = ["forze.infra.providers.*"]

[[tool.importlinter.contracts]]
name = "Protect integration subpackages"
type = "protected"
protected_modules = ["forze_fastapi"]
allowed_importers = []
as_packages = true

# ....................... #
# Dead code

[tool.vulture]
paths = ["src/forze", "src/forze_fastapi"]
sort_by_size = true
min_confidence = 80

# ....................... #
# Maintainability and complexity

[tool.radon]
exclude = ["tests/**"]
cc_min = "C"
mi_min = "B"

# ....................... #
# Dependency analysis

[tool.deptry]
known_first_party = ["forze", "forze_fastapi"]
ignore_notebooks = true

[tool.deptry.per_rule_ignores]
DEP002 = [
    "pydantic-extra-types",
    "types-aioboto3",
    "types-aiobotocore",
    "aiobotocore",
    "temporalio",
]
DEP003 = ["types_aiobotocore_s3", "typing_extensions"]

# ....................... #
# Ruff configuration

[tool.ruff.lint]
ignore = ["E402"]
