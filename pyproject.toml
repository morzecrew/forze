[project]
name = "forze"
dynamic = ["version"]
requires-python = ">=3.13,<3.15"
license = { file = "LICENSE" }
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
    "Development Status :: 4 - Beta",
]
description = "Domain-Driven Design and Hexagonal Architecture for backend services"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [{ name = "Lev Litvinov", email = "misery7100@gmail.com" }]
maintainers = [{ name = "Lev Litvinov", email = "misery7100@gmail.com" }]
keywords = [
    "architecture",
    "ddd",
    "hexagonal",
    "domain-driven-design",
    "hexagonal-architecture",
    "framework",
    "kernel",
]

# ....................... #
# Dependencies

dependencies = [
    "attrs>=25.4.0",
    "croniter>=6.0.0",
    "cryptography>=44.0.1",
    "opentelemetry-api>=1.39.0",
    "opentelemetry-sdk>=1.39.0",
    "orjson>=3.11.7",
    "pydantic>=2.12.5",
    "pydantic-extra-types>=2.11.0",
    "pyyaml>=6.0.3",
    "rich>=14.0.0",
    "structlog>=25.0.0",
]

[dependency-groups]
dev = [
    "anyio>=4.12.1",
    "bandit>=1.9.3",
    "deptry>=0.24.0",
    "import-linter>=2.10",
    "mypy[faster-cache]>=1.19.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-timeout>=2.3.0",
    "pytest-xdist>=3.8.0",
    "radon>=6.0.1",
    "ruff>=0.15.5",
    "testcontainers[minio,rabbitmq,vault,google,clickhouse,neo4j]>=4.14.1",
    "types-croniter>=6.0.0",
    "types-pyyaml>=6.0.12.20250915",
    "vulture>=2.14",
    "pre-commit>=4.5.1",
    "dirty-equals>=0.11",
    "polyfactory>=3.3.0",
    "hypothesis>=6.153.0",
    "typer>=0.12.0",
    "py-spy>=0.4.2",
    "zizmor>=1.25.2",
    # Lakehouse fixture writers for forze_duckdb integration tests (delta/iceberg are
    # read via DuckDB extensions at runtime; these only create the tables to read).
    "deltalake>=0.22.0",
    "pyiceberg[sql-sqlite]>=0.8.0",
]
docs = [
    "zensical>=0.0.43",
    "pygments>=2.19.2",
    "pymdown-extensions>=10.21",
    "mike",
]

[tool.uv.sources]
# Zensical's mike fork (no PyPI release). Pin the exact commit: an unpinned git
# source tracks the default branch's HEAD, so any later `uv lock` (e.g. bumping
# another dep) would silently re-resolve mike — a docs-build change with no diff
# in this file. Bump deliberately by updating the rev. (== the current uv.lock.)
mike = { git = "https://github.com/squidfunk/mike", rev = "2d4ad799442f4592db8ad53b179bfb33db8c69ac" }

# ....................... #
# Optional dependencies

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.135.1",
    "httpx>=0.28.0",
    "python-multipart>=0.0.22",
    "scalar-fastapi>=1.8.0",
    "starlette>=0.52.1",
    "uvicorn[standard]>=0.42.0",
]
postgres = ["psycopg-pool>=3.3.0", "psycopg[binary]>=3.3.3"]
redis = ["redis>=7.3.0"]
temporal = ["temporalio>=1.23.0"]
