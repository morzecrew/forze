# ....................... #
# Maintainability and complexity

[tool.radon]
exclude = ["tests/**"]
cc_min = "C"
mi_min = "B"

# ....................... #
# Dependency analysis

[tool.deptry]
known_first_party = [
    "forze",
    "forze_kits",
    "forze_fastapi",
    "forze_mock",
    "forze_dst",
    "forze_cli",
    "forze_postgres",
    "forze_redis",
    "forze_s3",
    "forze_gcs",
    "forze_bigquery",
    "forze_clickhouse",
    "forze_duckdb",
    "forze_socketio",
    "forze_temporal",
    "forze_inngest",
    "forze_mongo",
    "forze_firestore",
    "forze_rabbitmq",
    "forze_kafka",
    "forze_sqs",
    "forze_kms",
    "forze_identity",
    "forze_vault",
    "forze_meilisearch",
    "forze_http",
    "forze_neo4j",
    "forze_mcp",
]
ignore_notebooks = true

[tool.deptry.per_rule_ignores]
DEP002 = [
    "pydantic-extra-types",
    "types-aioboto3",
    "types-aiobotocore",
    "aiobotocore",
    "httpx",                 # required by starlette.testclient.TestClient
    "python-socketio-stubs",
    "python-multipart",
    "email-validator",       # required for pydantic.EmailStr
    #! Added temporarily
    "uvicorn",
    "types-hvac",
]
DEP003 = [
    "types_aiobotocore_s3",
    "types_aiobotocore_sqs",
    "types_aiobotocore_kms",
    "grpc",  # used directly by forze_kms.gcp for an emulator insecure channel; ships via google-cloud-kms
    "yandex",  # forze_kms.yc imports the generated KMS stubs; ships inside the yandexcloud dist
    "typing_extensions",
    "pydantic_core",
]

# ....................... #
# Ruff configuration

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import sorting)
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "RUF",   # ruff-specific rules
    "ASYNC", # flake8-async
    "C4",    # flake8-comprehensions
    "ISC",   # flake8-implicit-str-concat
    "PIE",   # flake8-pie
    "T20",   # flake8-print
    "SIM",   # flake8-simplify
]
ignore = [
    "E402",     # module-import-not-at-top: deferred/guarded imports are an established pattern here
    "E501",     # line length is owned by `ruff format` (code is wrapped at 100); the remaining long
                # lines are unwrappable prose — single-token Sphinx :class: refs, minified embedded
                # HTML/JS assets, and `type: ignore`/`nosec` justification comments
    "ISC001",   # single-line implicit concat: conflicts with `ruff format`
    "ASYNC109", # ports/adapters deliberately expose `timeout` parameters as API surface
    "RUF001",   # ambiguous unicode: docs deliberately use typographic/math notation (×, −, ∪, –)
    "RUF002",   # see RUF001
    "RUF003",   # see RUF001
    "RUF022",   # __all__ is deliberately grouped by category (mirrors lazy-export tables), not sorted
    "UP040",    # PEP 695 type aliases/generics: migration is a separate arc — the framework does
    "UP046",    # heavy runtime type introspection (codecs/specs) and mechanical conversion of
    "UP047",    # ~80 generic declarations is not behavior-neutral enough to adopt via lint fixes
]

[tool.ruff.lint.flake8-bugbear]
# Calls that are provably immutable (frozen attrs classes / Typer's declarative
# option markers), safe as argument or ContextVar defaults (B006/B008/B039).
# Config classes appear twice: ruff resolves qualified names from the import
# site, and they are imported both from the defining module and its re-export.
extend-immutable-calls = [
    "typer.Option",
    "forze.base.primitives.entropy_source.SystemEntropySource",
    "forze.base.primitives.entropy_source.SystemSecretEntropy",
    "forze.base.primitives.time_source.SystemTimeSource",
    "forze_kits.aggregates.document.value_objects.DocumentMappers",
    "forze_kits.aggregates.search.value_objects.SearchMappers",
    "forze_kafka.kernel.client.KafkaConfig",
    "forze_kafka.kernel.client.value_objects.KafkaConfig",
    "forze_mongo.kernel.client.MongoConfig",
    "forze_mongo.kernel.client.value_objects.MongoConfig",
    "forze_neo4j.kernel.client.Neo4jConfig",
    "forze_neo4j.kernel.client.value_objects.Neo4jConfig",
    "forze_postgres.kernel.client.PostgresConfig",
    "forze_postgres.kernel.client.value_objects.PostgresConfig",
    "forze_rabbitmq.kernel.client.RabbitMQConfig",
    "forze_rabbitmq.kernel.client.value_objects.RabbitMQConfig",
    "forze_redis.kernel.client.RedisConfig",
    "forze_redis.kernel.client.value_objects.RedisConfig",
    "forze_temporal.kernel.client.TemporalConfig",
    "forze_temporal.kernel.client.value_objects.TemporalConfig",
]
