version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"

    # Wait before adopting a freshly-published version so a compromised release
    # has time to be yanked before Dependabot opens a PR for it.
    cooldown:
      default-days: 7
      semver-major-days: 14

    labels:
      - "dependencies"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "🔧 chore"
      prefix-development: "🔧 chore"
      include: "scope"

    pull-request-branch-name:
      separator: "-"

    groups:
      uv-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

      uv-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

      uv-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Berlin"

    # `github-actions` cooldown only supports `default-days`
    cooldown:
      default-days: 7

    labels:
      - "dependencies"
      - "ci"

    open-pull-requests-limit: 3

    commit-message:
      prefix: "👷 ci"
      include: "scope"

    pull-request-branch-name:
      separator: "-"

    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: daily
    cooldown:
      default-days: 7
