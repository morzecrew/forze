name: Publish documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'pages/**'

  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency: pages

jobs:
  build:
    name: Build the documentation
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install d2
        run: |
          set -euxo pipefail

          D2_VERSION=v0.7.1

          curl -LsSf -o /tmp/d2.tar.gz \
          "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz";

          mkdir -p /tmp/d2-extract
          tar -xzf /tmp/d2.tar.gz -C /tmp/d2-extract
          sudo mv "$(find /tmp/d2-extract -type f -name d2 | head -n 1)" /usr/local/bin/d2
          sudo chmod +x /usr/local/bin/d2

          d2 --version

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build site
        run: just build-docs

      - name: Upload pages artifact
        id: upload-artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: pages/site

  deploy:
    name: Deploy site to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
