name: Continuous Integration

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      code: ${{ steps.scope.outputs.code }}
      force_full: ${{ steps.force.outputs.force_full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Force full run for manual/called workflows
        id: force
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect path changes
        id: scope
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - ".github/workflows/ci.yml"

  quality:
    name: Run quality checks
    needs: changes
    if: needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run quality checks
        run: just quality -s

  tests:
    name: Run tests
    needs: [changes, quality]
    if: |
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') && 
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run tests
        run: |
          mkdir -p test-results
          just test-fast --junit-xml=test-results/pytest.xml

      - name: Publish JUnit report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6.3.1
        with:
          report_paths: "test-results/*.xml"
          check_name: "Pytest report"
          require_tests: true
          detailed_summary: true
          include_passed: false
          comment: true
          updateComment: true
          check_annotations: true
          fail_on_failure: false
  
  required-ci:
    name: Required Continuous Integration
    needs: [changes, quality, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          echo "changes.result=${{ needs.changes.result }}"
          echo "quality.result=${{ needs.quality.result }}"
          echo "tests.result=${{ needs.tests.result }}"
          echo "code=${{ needs.changes.outputs.code }}"
          echo "force_full=${{ needs.changes.outputs.force_full }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job failed"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.force_full }}" == "true" || "${{ needs.changes.outputs.code }}" == "true" ]]; then
            if [[ "${{ needs.quality.result }}" != "success" ]]; then
              echo "quality job did not succeed"
              exit 1
            fi

            if [[ "${{ needs.tests.result }}" != "success" ]]; then
              echo "tests job did not succeed"
              exit 1
            fi
          else
            if [[ "${{ needs.quality.result }}" != "skipped" ]]; then
              echo "quality was expected to be skipped"
              exit 1
            fi

            if [[ "${{ needs.tests.result }}" != "skipped" ]]; then
              echo "tests was expected to be skipped"
              exit 1
            fi
          fi

          echo "required-ci passed"