name: Continuous Integration

on:
  workflow_call:
    inputs:
      force_full:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      force_full:
        required: false
        type: boolean
        default: true

  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".gitleaks.toml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      code: ${{ steps.scope.outputs.code }}
      force_full: ${{ steps.force.outputs.force_full }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Force full run
        id: force
        run: |
          if [[ "${{ inputs.force_full }}" == "true" ]]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect path changes
        id: scope
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - ".gitleaks.toml"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"

  quality:
    name: Run quality checks
    needs: changes
    if: needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run quality checks
        run: just quality -s

  # Each suite runs in its own runner so only that integration's testcontainers
  # are alive at once — the full serial suite peaks well over the 16 GB runner.
  # Per-shard coverage data is combined + gated in the `coverage` job below.
  test:
    name: Test (${{ matrix.name }})
    needs: [changes, quality]
    if: |
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: unit, path: tests/unit }
          - { name: integration-core, path: tests/integration/test_forze }
          - { name: authn, path: tests/integration/test_forze_authn }
          - { name: authz, path: tests/integration/test_forze_authz }
          - { name: bigquery, path: tests/integration/test_forze_bigquery }
          - { name: clickhouse, path: tests/integration/test_forze_clickhouse }
          - { name: fastapi, path: tests/integration/test_forze_fastapi }
          - { name: firestore, path: tests/integration/test_forze_firestore }
          - { name: gcs, path: tests/integration/test_forze_gcs }
          - { name: inngest, path: tests/integration/test_forze_inngest_integration }
          - { name: meilisearch, path: tests/integration/test_forze_meilisearch }
          - { name: mock, path: tests/integration/test_forze_mock }
          - { name: mongo, path: tests/integration/test_forze_mongo }
          - { name: neo4j, path: tests/integration/test_forze_neo4j }
          - { name: postgres, path: tests/integration/test_forze_postgres }
          - { name: rabbitmq, path: tests/integration/test_forze_rabbitmq }
          - { name: redis, path: tests/integration/test_forze_redis }
          - { name: s3, path: tests/integration/test_forze_s3 }
          - { name: sqs, path: tests/integration/test_forze_sqs }
          - { name: temporal-integration, path: tests/integration/test_forze_temporal_integration }
          - { name: vault, path: tests/integration/test_forze_vault }
    env:
      COVERAGE_FILE: .coverage.${{ matrix.name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run ${{ matrix.name }} tests
        run: |
          just test "${{ matrix.path }}" \
            --cov=src \
            --cov-report= \
            --cov-fail-under=0 \
            --junitxml="junit-${{ matrix.name }}.xml" \
            -o junit_family=legacy

      - name: Upload coverage data
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data-${{ matrix.name }}
          path: .coverage.${{ matrix.name }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./junit-${{ matrix.name }}.xml

  # Combine per-shard coverage into one report, enforce the threshold, upload.
  coverage:
    name: Coverage gate
    needs: [changes, quality, test]
    if: |
      !cancelled() &&
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-data-*
          path: coverage-data
          merge-multiple: true

      - name: Combine coverage + generate report
        run: |
          mv coverage-data/.coverage.* . 2>/dev/null || true
          uv run coverage combine
          uv run coverage xml || true  # never gate here; upload first, gate below

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage
          files: ./coverage.xml

      - name: Enforce coverage threshold
        run: uv run coverage report --fail-under=80

  required-ci:
    name: Required Continuous Integration
    needs: [changes, quality, test, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Verify required jobs
        shell: bash
        run: |
          echo "changes.result=${{ needs.changes.result }}"
          echo "quality.result=${{ needs.quality.result }}"
          echo "test.result=${{ needs.test.result }}"
          echo "coverage.result=${{ needs.coverage.result }}"
          echo "code=${{ needs.changes.outputs.code }}"
          echo "force_full=${{ needs.changes.outputs.force_full }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job failed"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.force_full }}" == "true" || "${{ needs.changes.outputs.code }}" == "true" ]]; then
            if [[ "${{ needs.quality.result }}" != "success" ]]; then
              echo "quality job did not succeed"
              exit 1
            fi

            if [[ "${{ needs.test.result }}" != "success" ]]; then
              echo "test matrix did not succeed"
              exit 1
            fi

            if [[ "${{ needs.coverage.result }}" != "success" ]]; then
              echo "coverage gate did not succeed"
              exit 1
            fi
          else
            if [[ "${{ needs.quality.result }}" != "skipped" ]]; then
              echo "quality was expected to be skipped"
              exit 1
            fi

            if [[ "${{ needs.test.result }}" != "skipped" ]]; then
              echo "test was expected to be skipped"
              exit 1
            fi
          fi

          echo "required-ci passed"
