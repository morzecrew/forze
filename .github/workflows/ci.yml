name: Continuous Integration

on:
  workflow_call:
    inputs:
      force_full:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      force_full:
        required: false
        type: boolean
        default: true

  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".gitleaks.toml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      code: ${{ steps.scope.outputs.code }}
      force_full: ${{ steps.force.outputs.force_full }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Force full run
        id: force
        env:
          FORCE_FULL: ${{ inputs.force_full }}
        run: bash .github/scripts/ci-set-force-full.sh

      - name: Detect path changes
        id: scope
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - ".gitleaks.toml"
              - ".pre-commit-config.yaml"
              - ".github/workflows/ci.yml"

  quality:
    name: Run quality checks
    needs: changes
    if: needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run quality checks
        run: just quality -s

  # Each suite runs in its own runner so only that integration's testcontainers
  # are alive at once — the full serial suite peaks well over the 16 GB runner.
  # Per-shard coverage data is combined + gated in the `coverage` job below.
  test:
    name: Test (${{ matrix.name }})
    needs: [changes, quality]
    if: |
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: unit, path: tests/unit }
          - { name: core, path: tests/integration/test_forze }
          - { name: authn, path: tests/integration/test_forze_authn }
          - { name: authz, path: tests/integration/test_forze_authz }
          - { name: bigquery, path: tests/integration/test_forze_bigquery }
          - { name: clickhouse, path: tests/integration/test_forze_clickhouse }
          - { name: duckdb, path: tests/integration/test_forze_duckdb }
          - { name: examples, path: tests/integration/test_examples }
          - { name: fastapi, path: tests/integration/test_forze_fastapi }
          - { name: firestore, path: tests/integration/test_forze_firestore }
          - { name: gcs, path: tests/integration/test_forze_gcs }
          - { name: inngest, path: tests/integration/test_forze_inngest_integration }
          - { name: kafka, path: tests/integration/test_forze_kafka }
          - { name: kms, path: tests/integration/test_forze_kms }
          - { name: meilisearch, path: tests/integration/test_forze_meilisearch }
          - { name: mock, path: tests/integration/test_forze_mock }
          - { name: mongo, path: tests/integration/test_forze_mongo }
          - { name: neo4j, path: tests/integration/test_forze_neo4j }
          - { name: postgres, path: tests/integration/test_forze_postgres }
          - { name: rabbitmq, path: tests/integration/test_forze_rabbitmq }
          - { name: redis, path: tests/integration/test_forze_redis }
          - { name: s3, path: tests/integration/test_forze_s3 }
          - { name: sqs, path: tests/integration/test_forze_sqs }
          - { name: temporal, path: tests/integration/test_forze_temporal_integration }
          - { name: vault, path: tests/integration/test_forze_vault }
    env:
      COVERAGE_FILE: .coverage.${{ matrix.name }}
      # Force coverage's settrace-based `ctrace` core instead of the Python 3.12+
      # default `sysmon` (sys.monitoring) core. sysmon's branch callback fires
      # *inside* Temporal's workflow sandbox, where it lazily imports coverage
      # internals and calls platform.python_implementation() — blocked as
      # non-deterministic (RestrictedWorkflowAccessError) → infinite workflow-task
      # retry → hung `temporal` shard. ctrace parses at report time, outside the
      # sandbox, so it's sandbox-safe. Set for every shard for one consistent tracer.
      COVERAGE_CORE: ctrace
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run ${{ matrix.name }} tests
        run: |
          just test "${{ matrix.path }}" \
            --cov=src \
            --cov-report= \
            --cov-fail-under=0 \
            --junitxml="junit-${{ matrix.name }}.xml" \
            -o junit_family=legacy

      - name: Upload coverage data
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data-${{ matrix.name }}
          path: .coverage.${{ matrix.name }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./junit-${{ matrix.name }}.xml

  # Combine per-shard coverage into one report, enforce the threshold, upload.
  coverage:
    name: Coverage gate
    needs: [changes, quality, test]
    if: |
      !cancelled() &&
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-data-*
          path: coverage-data
          merge-multiple: true

      - name: Combine coverage + generate report
        run: bash .github/scripts/combine-coverage.sh

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage
          files: ./coverage.xml

      - name: Enforce coverage threshold
        run: uv run coverage report --fail-under=80

  required-ci:
    name: Required Continuous Integration
    needs: [changes, quality, test, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Kept INLINE on purpose (no checkout): this is the required status check,
      # so its pass/fail must not depend on a file pulled from the PR-head
      # checkout. Reading job results via the `needs` context — passed through
      # `env` so PR-controlled strings never interpolate into the script body —
      # keeps the gate self-contained. (The real guarantees are branch protection
      # requiring this check by name + PR review; see also the operational scripts
      # under .github/scripts, which are not trust gates.)
      - name: Verify required jobs
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CODE: ${{ needs.changes.outputs.code }}
          FORCE_FULL: ${{ needs.changes.outputs.force_full }}
        run: |
          echo "changes.result=${CHANGES_RESULT}"
          echo "quality.result=${QUALITY_RESULT}"
          echo "test.result=${TEST_RESULT}"
          echo "coverage.result=${COVERAGE_RESULT}"
          echo "code=${CODE}"
          echo "force_full=${FORCE_FULL}"

          if [[ "${CHANGES_RESULT}" != "success" ]]; then
            echo "changes job failed"
            exit 1
          fi

          if [[ "${FORCE_FULL}" == "true" || "${CODE}" == "true" ]]; then
            if [[ "${QUALITY_RESULT}" != "success" ]]; then
              echo "quality job did not succeed"
              exit 1
            fi
            if [[ "${TEST_RESULT}" != "success" ]]; then
              echo "test matrix did not succeed"
              exit 1
            fi
            if [[ "${COVERAGE_RESULT}" != "success" ]]; then
              echo "coverage gate did not succeed"
              exit 1
            fi
          else
            if [[ "${QUALITY_RESULT}" != "skipped" ]]; then
              echo "quality was expected to be skipped"
              exit 1
            fi
            if [[ "${TEST_RESULT}" != "skipped" ]]; then
              echo "test was expected to be skipped"
              exit 1
            fi
            if [[ "${COVERAGE_RESULT}" != "skipped" ]]; then
              echo "coverage was expected to be skipped"
              exit 1
            fi
          fi

          echo "required-ci passed"

  perf-gate:
    name: Perf regression gate (A/B vs merge-base)
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-perf-gate')
    runs-on: ubuntu-latest
    # Burn-in: observe-only while the false-positive rate is measured on real
    # PRs; flip to enforcing (remove continue-on-error) once it proves quiet.
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code (full history for merge-base) # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Prepare merge-base worktree and sync both envs
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/perf-prepare-envs.sh

      # Methodology (interleaved A/B on one VM, median-of-mins, >15% gate) is
      # documented in the script header. Tune rounds with PERF_GATE_ROUNDS (default 3).
      - name: Interleaved A/B benchmark and median-of-mins gate (fail >15%)
        run: bash .github/scripts/perf-benchmark-gate.sh
