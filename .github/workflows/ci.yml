name: Continuous Integration

on:
  workflow_call:
    inputs:
      force_full:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      force_full:
        required: false
        type: boolean
        default: true

  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      code: ${{ steps.scope.outputs.code }}
      force_full: ${{ steps.force.outputs.force_full }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Force full run
        id: force
        run: |
          if [[ "${{ inputs.force_full }}" == "true" ]]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect path changes
        id: scope
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - ".github/workflows/ci.yml"

  quality:
    name: Run quality checks
    needs: changes
    if: needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run quality checks
        run: just quality -s

  tests:
    name: Run tests
    needs: [changes, quality]
    if: |
      (needs.changes.outputs.force_full == 'true' || needs.changes.outputs.code == 'true') &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run tests
        run: |
          just test-fast \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./junit.xml

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage
          files: ./coverage.xml

  required-ci:
    name: Required Continuous Integration
    needs: [changes, quality, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Verify required jobs
        shell: bash
        run: |
          echo "changes.result=${{ needs.changes.result }}"
          echo "quality.result=${{ needs.quality.result }}"
          echo "tests.result=${{ needs.tests.result }}"
          echo "code=${{ needs.changes.outputs.code }}"
          echo "force_full=${{ needs.changes.outputs.force_full }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job failed"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.force_full }}" == "true" || "${{ needs.changes.outputs.code }}" == "true" ]]; then
            if [[ "${{ needs.quality.result }}" != "success" ]]; then
              echo "quality job did not succeed"
              exit 1
            fi

            if [[ "${{ needs.tests.result }}" != "success" ]]; then
              echo "tests job did not succeed"
              exit 1
            fi
          else
            if [[ "${{ needs.quality.result }}" != "skipped" ]]; then
              echo "quality was expected to be skipped"
              exit 1
            fi

            if [[ "${{ needs.tests.result }}" != "skipped" ]]; then
              echo "tests was expected to be skipped"
              exit 1
            fi
          fi

          echo "required-ci passed"
