name: "CodeQL"

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/codeql-config.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/codeql-config.yml"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@eda5730a8bfb740e03a28087a958444c646e5842 # v4.32.6
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@eda5730a8bfb740e03a28087a958444c646e5842 # v4.32.6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@eda5730a8bfb740e03a28087a958444c646e5842 # v4.32.6
