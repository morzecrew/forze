name: "CodeQL"

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/codeql-config.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/codeql-config.yml"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0e150e40762c1253b364a04b0fc9f2cc14effff2 # v4.32.6
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@0e150e40762c1253b364a04b0fc9f2cc14effff2 # v4.32.6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0e150e40762c1253b364a04b0fc9f2cc14effff2 # v4.32.6
