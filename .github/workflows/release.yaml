name: Release a new package version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: Run CI before release
    uses: ./.github/workflows/ci.yml
    with:
      force_full: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write

  build:
    name: Build the package
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Ensure release tag is on main
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin main:refs/remotes/origin/main

          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "OK: tag commit is on main"
          else
            echo "ERROR: tag '${GITHUB_REF_NAME}' points to commit not contained in main"
            echo "Tag commit: $TAG_COMMIT"
            echo "Refuse release build."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Build
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-package
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forze
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "version=${tag#v}" >> $GITHUB_OUTPUT

      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
        with:
          version: ${{ steps.ver.outputs.version }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release (no files)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changes }}
