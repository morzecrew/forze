name: Release a new package version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: Run CI before release
    uses: ./.github/workflows/ci.yml
    with:
      force_full: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write

  build:
    name: Build the package
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Ensure release tag is on main
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin main:refs/remotes/origin/main

          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "OK: tag commit is on main"
          else
            echo "ERROR: tag '${GITHUB_REF_NAME}' points to commit not contained in main"
            echo "Tag commit: $TAG_COMMIT"
            echo "Refuse release build."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Build
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: python-package
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forze
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "version=${tag#v}" >> $GITHUB_OUTPUT

      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
        with:
          version: ${{ steps.ver.outputs.version }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release (no files)
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changes }}
