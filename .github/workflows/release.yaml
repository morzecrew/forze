name: Release a new package version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: Run CI before release
    uses: ./.github/workflows/ci.yml
    with:
      force_full: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write

  build:
    name: Build the package
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Ensure release tag is on main
        run: bash .github/scripts/ensure-tag-on-main.sh

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0 # zizmor: ignore[cache-poisoning] cache feeds `uv build`; lockfile-keyed and the published wheel is built from a pinned checkout
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Build
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-package
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forze
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: ver
        run: bash .github/scripts/compute-version-from-tag.sh

      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31 # v2.4.0
        with:
          version: ${{ steps.ver.outputs.version }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release # zizmor: ignore[superfluous-actions] prefer the pinned action over an inline `gh release` script
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changes }}
