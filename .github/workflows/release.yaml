name: Release a new package version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: Run CI before release
    uses: ./.github/workflows/ci.yml
    with:
      force_full: true
    permissions:
      contents: read
      # The called workflow's `changes` job declares `pull-requests: read` (dorny/paths-filter
      # reads the PR's file list through the API on pull_request events). A called workflow's
      # jobs cannot exceed the calling job's permission ceiling, and GitHub checks that
      # statically — so the grant is required here even though a tag push never resolves a PR
      # (paths-filter falls back to git, and force_full skips the filter's result anyway).
      pull-requests: read

  build:
    name: Build the package
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Ensure release tag is on main
        run: bash .github/scripts/ensure-tag-on-main.sh

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.2.0 # zizmor: ignore[cache-poisoning] cache feeds `uv build`; lockfile-keyed and the published wheel is built from a pinned checkout
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Build
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-package
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forze
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package
          path: dist/

      - name: Checkout code # zizmor: ignore[artipacked] no workspace/.git is uploaded as an artifact
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: ver
        run: bash .github/scripts/compute-version-from-tag.sh

      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31 # v2.4.0
        with:
          version: ${{ steps.ver.outputs.version }}
          path: ./CHANGELOG.md

      - name: Create GitHub Release # zizmor: ignore[superfluous-actions] prefer the pinned action over an inline `gh release` script
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changes }}
