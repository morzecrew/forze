name: Bug report
description: Report a bug in Forze
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: If applicable, paste stack traces or logs.

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Linux / macOS / Windows"
