site_name: Forze
site_url: https://morzecrew.github.io/forze
repo_url: https://github.com/morzecrew/forze
dev_addr: "localhost:8045"

not_in_nav: |
  core-concepts/*
  core-package/*
  reference/contracts.md


theme:
  name: shadcn
  icon: null
  show_stargazers: false
  topbar_sections: false
  show_title: true
  pygments_style:
    light: github-light
    dark: dracula
  show_datetime: true

extra_css:
  - extra/extra.css

extra_javascript:
  - extra/extra.js

plugins:
  - search
  - pygments

markdown_extensions:
  - admonition
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.blocks.tab
  - pymdownx.blocks.caption
  - codehilite:
      guess_lang: false
      linenums: false
      anchor_linenums: false
      force_linenos: false

nav:
  - Start Here:
    - Home: index.md
    - Installation: installation.md
    - Getting Started: getting-started.md
    - First Project Walkthrough: first-project-walkthrough.md

  - Concepts:
    - Overview: concepts/index.md
    - Architecture: concepts/layered-architecture.md
    - Domain Layer: concepts/domain-layer.md
    - Application Layer: concepts/application-layer.md
    - Contracts and Adapters: concepts/contracts-adapters.md
    - Multi-tenancy: concepts/multi-tenancy.md
    - Specs and Wiring: concepts/specs-and-wiring.md
    - Aggregate Specification: concepts/aggregate-specification.md
    - Composition: concepts/usecase-composition.md

  - Recipes:
    - CRUD with FastAPI, Postgres, and Redis: recipes/crud-fastapi-postgres-redis.md
    - Authn, authz, and tenancy (FastAPI): recipes/authn-authz-tenancy-fastapi.md
    - Read-only Document API: recipes/read-only-document-api.md
    - Add Caching: recipes/add-caching.md
    - Add Idempotency: recipes/add-idempotency.md
    - Background Workflow: recipes/background-workflow.md

  - Reference:
    - Overview: reference/index.md
    - Base Layer: reference/base-layer.md
    - Domain Models: reference/domain-models.md
    - Contracts:
      - Overview: core-package/contracts.md
      - Document: core-package/contracts/document.md
      - Cache: core-package/contracts/cache.md
      - Queue: core-package/contracts/queue.md
      - Pub/Sub: core-package/contracts/pubsub.md
      - Stream: core-package/contracts/stream.md
      - Storage: core-package/contracts/storage.md
      - Workflow: core-package/contracts/workflow.md
      - Idempotency: core-package/contracts/idempotency.md
    - Execution: reference/execution.md
    - Middleware & Plans: reference/middleware-plans.md
    - Composition & Mapping: reference/composition.md
    - Query Syntax: reference/query-syntax.md

  - Integrations:
    - FastAPI: integrations/fastapi.md
    - Socket.IO: integrations/socketio.md
    - PostgreSQL: integrations/postgres.md
    - Redis / Valkey: integrations/redis.md
    - S3-Compatible Storage: integrations/s3.md
    - MongoDB: integrations/mongo.md
    - Temporal: integrations/temporal.md
    - SQS: integrations/sqs.md
    - RabbitMQ: integrations/rabbitmq.md
    - Mock: integrations/mock.md
