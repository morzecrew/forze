site_name: Forze
site_url: https://morzecrew.github.io/forze
repo_url: https://github.com/morzecrew/forze

theme:
  name: shadcn
  icon: null
  show_stargazers: false
  topbar_sections: false
  show_title: true
  pygments_style:
    light: github-light
    dark: dracula
  show_datetime: true

extra_css:
  - assets/css/extra.css

plugins:
  - d2
  - search
  - pygments
  - mkdocstrings:
      handlers:
        python:
          paths: ["../src"]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.blocks.tab
  - pymdownx.blocks.caption
  - codehilite:
      guess_lang: false
      linenums: false
      anchor_linenums: false
      force_linenos: false

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Core Concepts:
    - Overview: core-concepts/index.md
    - Layered Architecture: core-concepts/layered-architecture.md
    - Domain Layer: core-concepts/domain-layer.md
    - Application Layer: core-concepts/application-layer.md
    - Contracts and Adapters: core-concepts/contracts-adapters.md
    - Aggregate Specification: core-concepts/aggregate-specification.md
    - Usecase Composition: core-concepts/usecase-composition.md
  - Core Package:
    - Overview: core-package/index.md
    - Query Syntax: core-package/query-syntax.md
  - Integrations:
    - FastAPI: integrations/fastapi.md
    - Socket.IO: integrations/socketio.md
    - PostgreSQL: integrations/postgres.md
    - Redis: integrations/redis.md
    - S3: integrations/s3.md
    - MongoDB: integrations/mongo.md
    - Temporal: integrations/temporal.md
    - SQS: integrations/sqs.md
    - RabbitMQ: integrations/rabbitmq.md
  # - API Reference:
  #   - Core: api/core.md
