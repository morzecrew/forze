        ] },
        { "Interfaces" = [
            "recipes/expose-an-aggregate-over-mcp.md",
        ] },
    ] },
    { "Reference" = [
        "reference/glossary.md",
        { "Contracts" = [
            "reference/contracts.md",
            "reference/contracts/document.md",
            "reference/contracts/stores.md",
            "reference/contracts/search.md",
            "reference/contracts/messaging.md",
        ] },
        "reference/query-syntax.md",
        "reference/mapping.md",
        "reference/errors.md",
    ] },
]

# ....................... #
# Development

dev_addr = "localhost:8045"

# ....................... #
# Theme

[project.theme]
features = [
    "search.highlight",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.progress",
    "navigation.tabs",
    "navigation.sections",
    # "navigation.expand",
    "navigation.path",
    "navigation.top",
    "toc.follow",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
]
custom_dir = "overrides"
logo = "_images/forze-multicolor.png"
favicon = "_images/forze-multicolor.png"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "blue grey"
accent = "deep orange"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
primary = "blue grey"
accent = "deep orange"

# ....................... #
# Extensions

[project.markdown_extensions.zensical.extensions.glightbox]
auto_themed = true
auto_caption = true

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs", "../examples"]
check_paths = true
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]

# ....................... #
# Versioning

[project.extra.version]
provider = "mike"
# Root redirects to whatever carries the "latest" alias (the newest released
# minor). Patch releases refresh the same minor; `dev` (from main) is a separate,
# never-default channel. See .github/workflows/docs-*.yaml.
default = "latest"
alias = true
