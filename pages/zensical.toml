[project]
site_name = "Forze"
site_url = "https://morzecrew.github.io/forze/"
site_description = "Domain-Driven Design and Hexagonal Architecture for backend services"
site_author = "Lev Litvinov"
copyright = "&copy; 2026 Lev Litvinov and contributors"

# ....................... #
# Repo

repo_url = "https://github.com/morzecrew/forze"
repo_name = "forze"

# ....................... #
# Styles

extra_css = ["_stylesheets/glightbox.min.css", "_stylesheets/extra.css"]
# glightbox.min.js is injected in <head> via overrides/main.html (extrahead), not
# here — extra_javascript is appended after the theme bundle, too late to define
# the GLightbox global before the bundle's CDN-gate runs.
extra_javascript = ["_javascripts/theme.js", "_javascripts/hero.js"]

# ....................... #
# Navigation

nav = [
    { "Home" = "index.md" },
    { "Get Started" = [
        "get-started/introduction.md",
        "get-started/installation.md",
        "get-started/quickstart.md",
        "get-started/project-structure.md",
    ] },
    { "Learn" = [
        { "Concepts" = [
            "core-concepts/overview.md",
            "core-concepts/architecture.md",
            "core-concepts/domain-layer.md",
            "core-concepts/application-layer.md",
            "core-concepts/contracts.md",
            "core-concepts/runtime.md",
        ] },
        { "In Depth" = [
            "in-depth/wiring.md",
            "in-depth/transactions.md",
            "in-depth/testing.md",
            "in-depth/errors.md",
            "in-depth/concurrency-conflicts.md",
            "in-depth/idempotency.md",
            "in-depth/events-sagas.md",
            "in-depth/reading-data.md",
            "in-depth/multi-tenancy.md",
            "in-depth/identity.md",
            "in-depth/encryption.md",
        ] },
        { "Execution Engine" = [
            "in-depth/capability-execution.md",
            "in-depth/deadlines.md",
            "in-depth/resilience.md",
            "in-depth/shutdown-and-fleets.md",
            "in-depth/observability.md",
        ] },
    ] },
    { "Integrations" = [
        "integrations/index.md",
        { "Data" = [
            "integrations/postgres.md",
            "integrations/mongo.md",
            "integrations/firestore.md",
            "integrations/neo4j.md",
            "integrations/redis.md",
            "integrations/s3.md",
            "integrations/gcs.md",
            "integrations/meilisearch.md",
            "integrations/bigquery.md",
            "integrations/clickhouse.md",
            "integrations/duckdb.md",
        ] },
        { "Messaging" = [
            "integrations/rabbitmq.md",
            "integrations/sqs.md",
        ] },
        { "Workflows" = [
            "integrations/temporal.md",
            "integrations/inngest.md",
        ] },
        { "Inbound" = [
            "integrations/fastapi.md",
            "integrations/socketio.md",
            "integrations/mcp.md",
        ] },
        { "Identity" = [
            "integrations/authn.md",
            "integrations/oidc.md",
        ] },
        { "Secrets" = [
            "integrations/vault.md",
        ] },
        { "Outbound" = [
            "integrations/http.md",
        ] },
    ] },
    { "Recipes" = [
        { "Data" = [
            "recipes/crud-fastapi-postgres.md",
            "recipes/read-only-document-api.md",
            "recipes/cache-reads-with-redis.md",
            "recipes/add-idempotency.md",
        ] },
        { "Identity" = [
            "recipes/authn-authz-tenancy-fastapi.md",
            "recipes/local-identity.md",
            "recipes/external-bootstrap-forze-jwt.md",
            "recipes/external-idp-oidc.md",
