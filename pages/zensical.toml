[project]
site_name = "Forze"
site_url = "https://morzecrew.github.io/forze/"
site_description = "Domain-Driven Design and Hexagonal Architecture for backend services"
site_author = "Lev Litvinov"
copyright = "&copy; 2026 Lev Litvinov and contributors"

# ....................... #
# Repo

repo_url = "https://github.com/morzecrew/forze"
repo_name = "forze"

# ....................... #
# Styles

extra_css = [
    "_stylesheets/glightbox.min.css",
    "_stylesheets/extra.css",
    "_stylesheets/hero.css",
]
# glightbox.min.js is injected in <head> via overrides/main.html (extrahead), not
# here — extra_javascript is appended after the theme bundle, too late to define
# the GLightbox global before the bundle's CDN-gate runs.
extra_javascript = ["_javascripts/theme.js", "_javascripts/hero.js"]

# ....................... #
