repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.0
  hooks:
  - id: gitleaks
- repo: https://github.com/jumanjihouse/pre-commit-hooks
  rev: 3.0.0
  hooks:
  - id: forbid-binary
  - id: shfmt
  - id: shellcheck
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: local
  hooks:
  - id: no-frozen-setattr-bypass
    name: Ban object.__setattr__ in src (use attrs Factory/property/OnceCell)
    entry: object\.__setattr__
    language: pygrep
    files: ^src/.*\.py$
  - id: quality
    name: Run quality checks
    entry: just quality
    pass_filenames: false
    language: system
    stages: [pre-commit]
    args: [-s]
