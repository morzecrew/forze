# Stub Port Contracts for Unit Tests
# Branch: 003-forze-unit-tests
#
# Each stub must conform to the corresponding Protocol in forze.application.contracts._ports.
# StreamPort and WorkflowPort are EXCLUDED per user directive.

excluded_ports:
  - StreamPort
  - WorkflowPort

in_scope_ports:
  - name: DocumentReadPort
    module: forze.application.contracts._ports.document
    methods:
      - get
      - get_many
    note: Generic[R]; stub uses a simple ReadDocument model or JsonDict.

  - name: DocumentWritePort
    module: forze.application.contracts._ports.document
    methods:
      - create
      - update
      - delete
    note: Generic[R,D,C,U]; stub stores in dict keyed by UUID.

  - name: DocumentSearchPort
    module: forze.application.contracts._ports.document
    methods:
      - search
    note: Generic[R]; stub filters in-memory list.

  - name: DocumentPort
    module: forze.application.contracts._ports.document
    note: Combines DocumentReadPort, DocumentSearchPort, DocumentWritePort.

  - name: DocumentCachePort
    module: forze.application.contracts._ports.document
    methods:
      - get
      - set
      - delete
    note: Optional; simple dict-based cache.

  - name: StoragePort
    module: forze.application.contracts._ports.storage
    methods:
      - upload
      - download
      - delete
      - list_
    note: Stub stores bytes in dict keyed by storage key.

  - name: TxManagerPort
    module: forze.application.contracts._ports.tx
    methods:
      - scope_key
      - transaction
    note: Stub provides no-op async context manager.

  - name: CounterPort
    module: forze.application.contracts._ports.counter
    methods:
      - incr
      - incr_batch
      - decr
      - reset
    note: Stub uses in-memory int; thread-safe not required for unit tests.

  - name: IdempotencyPort
    module: forze.application.contracts._ports.idempotency
    note: Check protocol for required methods.

  - name: ActorPort
    module: forze.application.contracts._ports.actor
    note: Check protocol for required methods.

  - name: TenantPort
    module: forze.application.contracts._ports.tenant
    note: Check protocol for required methods.

  - name: OutboxPort
    module: forze.application.contracts._ports.outbox
    note: Check protocol for required methods.
